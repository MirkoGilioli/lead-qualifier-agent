steps:
  # Build Docker Image for PRODUCTION (Active on Release Tag v*)
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    args:
      [
        "build",
        "-t",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$TAG_NAME",
        "--build-arg",
        "COMMIT_SHA=$COMMIT_SHA",
        ".",
      ]
      
  # Push Docker Image to Artifact Registry (PRODUCTION)
  - name: "gcr.io/cloud-builders/docker"
    id: push-image
    args:
      [
        "push",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$TAG_NAME",
      ]

  # Prepare environment variables file
  - name: "ubuntu"
    id: prepare-env-file
    entrypoint: bash
    args:
      - "-c"
      - |
        echo "ENABLE_WEB_UI=false" >> conf/prod/.env
        echo "DB_USER=adk_user" >> conf/prod/.env
        echo "DB_NAME=sessions" >> conf/prod/.env
        echo "DB_CONNECTION_NAME=${_CLOUD_SQL_CONNECTION_NAME}" >> conf/prod/.env

  # Deploy to PROD on Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-prod
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "randstad-adk-prod"
      - "--image"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$TAG_NAME"
      - "--region"
      - "${_REGION}"
      - "--project"
      - "${PROJECT_ID}"
      - "--allow-unauthenticated"
      - "--env-vars-file"
      - "conf/prod/.env"
      - "--add-cloudsql-instances"
      - "${_CLOUD_SQL_CONNECTION_NAME}"
      - "--set-secrets"
      - "DB_PASSWORD=${_DB_PASSWORD_SECRET_NAME}:latest"

substitutions:
  _ARTIFACT_REGISTRY_REPO_NAME: randstad-adk-repo-prod
  _REGION: europe-west2
  _CONTAINER_NAME: randstad-adk
  _CLOUD_SQL_CONNECTION_NAME: "your-project:europe-west2:your-instance-name" # Update this in Cloud Build trigger
  _DB_PASSWORD_SECRET_NAME: "randstad-adk-db-password"

logsBucket: gs://${PROJECT_ID}-randstad-adk-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
